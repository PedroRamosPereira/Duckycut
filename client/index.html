<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Duckycut</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="panel">
        <div class="header">
            <h1>Duckycut</h1>
        </div>

        <main class="screens">
            <section id="screenStart" class="screen" data-screen="start">
                <div class="section">
                    <label class="section-label">ACTIVE SEQUENCE</label>
                    <div class="sequence-row">
                        <span id="sequenceName" class="sequence-name">No sequence</span>
                        <button id="btnRefreshSeq" class="icon-btn" title="Refresh sequence">&#x21bb;</button>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">MODO DE DETECÇÃO</label>
                    <div class="segmented-control" role="radiogroup" aria-label="Modo de detecção">
                        <label class="segment-option">
                            <input type="radio" name="detectionMode" value="vad">
                            <span>Detecção automática - VAD (WIP)</span>
                        </label>
                        <label class="segment-option">
                            <input type="radio" name="detectionMode" value="manual" checked>
                            <span>Modo manual</span>
                        </label>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">RANGE</label>
                    <div class="segmented-control" role="radiogroup" aria-label="Analysis range">
                        <label class="segment-option">
                            <input type="radio" name="rangeMode" value="full" checked>
                            <span>Full Sequence</span>
                        </label>
                        <label class="segment-option">
                            <input type="radio" name="rangeMode" value="inout">
                            <span>In-Out</span>
                        </label>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">SELECIONAR TRACKS</label>
                    <div id="trackList" class="track-list">
                        <span class="track-list-empty">Load a sequence to see tracks</span>
                    </div>
                </div>

                <button id="btnAnalyze" class="btn-primary">Analisar</button>
            </section>

            <section id="screenPrerender" class="screen" data-screen="prerender" style="display:none;">
                <div class="loading-panel">
                    <h2>Preparando áudio</h2>
                    <p>Aguarde enquanto o WAV temporário é gerado.</p>
                </div>
            </section>

            <section id="screenConfig" class="screen" data-screen="config" style="display:none;">
                <div id="manualConfigPanel" class="config-panel">
                <div class="section">
                    <label class="section-label">CONFIGURAÇÃO MANUAL</label>

                    <div class="setting-row">
                        <label>Aggressiveness</label>
                        <div class="slider-group">
                            <input type="range" id="aggressiveness" min="0" max="100" value="50" step="1">
                            <span id="aggressivenessVal" class="setting-value">50</span>
                        </div>
                        <div id="aggroDescription" class="aggro-desc">Threshold: <span id="aggroThresholdHint">-</span></div>
                    </div>

                    <div class="setting-row">
                        <label>Min Silence to Cut (ms)</label>
                        <div class="slider-group">
                            <input type="range" id="minDuration" min="100" max="3000" value="750" step="10">
                            <span id="minDurationVal" class="setting-value">750 ms</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">PADDING</label>
                    <div class="padding-link-group">
                        <div class="padding-rows">
                            <div class="setting-row">
                                <label>Padding In (ms)</label>
                                <div class="slider-group">
                                    <input type="range" id="paddingIn" min="0" max="500" value="50" step="10">
                                    <span id="paddingInVal" class="setting-value">50 ms</span>
                                </div>
                            </div>

                            <div class="setting-row">
                                <label>Padding Out (ms)</label>
                                <div class="slider-group">
                                    <input type="range" id="paddingOut" min="0" max="500" value="150" step="10">
                                    <span id="paddingOutVal" class="setting-value">150 ms</span>
                                </div>
                            </div>
                        </div>
                        <button id="btnLinkPadding" class="btn-link-padding" type="button" title="Link padding values" aria-label="Link padding">Link</button>
                    </div>

                    <button id="btnAdvancedToggle" class="btn-secondary" type="button">Advanced settings</button>

                    <div id="advancedSettings" class="advanced-settings">
                        <div class="advanced-inner">
                            <div class="setting-row">
                                <label>Min Clip Duration (ms)</label>
                                <div class="slider-group">
                                    <input type="range" id="minClipDuration" min="100" max="2000" value="500" step="50">
                                    <span id="minClipVal" class="setting-value">500 ms</span>
                                </div>
                            </div>

                            <div class="setting-row">
                                <label>Min Gap to Cut (ms)</label>
                                <div class="slider-group">
                                    <input type="range" id="minGapFill" min="0" max="1000" value="300" step="10">
                                    <span id="minGapFillVal" class="setting-value">300 ms</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="section" id="resultsSection" style="display:none;">
                    <label class="section-label">RESULTADO DA ANÁLISE</label>
                    <div id="resultsContent" class="results-content"></div>
                </div>

                <div class="action-row">
                    <button id="btnCancelConfig" class="btn-secondary">Voltar</button>
                    <button id="btnApply" class="btn-primary btn-apply">Aplicar cortes</button>
                </div>
                </div>

                <div id="vadConfigPanel" class="config-panel" style="display:none;">
                    <div class="vad-summary-panel">
                        <label class="section-label">RESULTADO INICIAL DO VAD</label>
                        <div class="vad-cut-count">
                            <span id="vadInitialCutsCount" class="vad-cut-count-value">--</span>
                            <span class="vad-cut-count-label">cortes detectados</span>
                        </div>
                    </div>

                    <div class="section">
                        <label class="section-label">PADDING</label>
                        <div class="padding-link-group">
                            <div class="padding-rows">
                                <div class="setting-row">
                                    <label>Padding In (ms)</label>
                                    <div class="slider-group">
                                        <input type="range" id="vadPaddingIn" min="0" max="500" value="150" step="10">
                                        <span id="vadPaddingInVal" class="setting-value">150 ms</span>
                                    </div>
                                </div>

                                <div class="setting-row">
                                    <label>Padding Out (ms)</label>
                                    <div class="slider-group">
                                        <input type="range" id="vadPaddingOut" min="0" max="500" value="300" step="10">
                                        <span id="vadPaddingOutVal" class="setting-value">300 ms</span>
                                    </div>
                                </div>
                            </div>
                            <button id="btnVadLinkPadding" class="btn-link-padding" type="button" title="Link padding values" aria-label="Link VAD padding">Link</button>
                        </div>
                    </div>

                    <div class="action-row">
                        <button id="btnCancelVadConfig" class="btn-secondary" type="button">Voltar</button>
                        <button id="btnApplyVadPlaceholder" class="btn-primary btn-apply" type="button">Aplicar cortes</button>
                    </div>
                </div>
            </section>

            <section id="screenApply" class="screen" data-screen="apply" style="display:none;">
                <div class="loading-panel">
                    <h2>Aplicando cortes</h2>
                    <p>O processo pode ser cancelado entre chunks.</p>
                    <button id="btnCancelApply" class="btn-danger">Cancelar</button>
                </div>
            </section>

            <section id="screenDone" class="screen" data-screen="done" style="display:none;">
                <div class="done-panel">
                    <h2>Processo concluído</h2>
                    <div id="doneSummary" class="results-content"></div>
                    <button id="btnBackStart" class="btn-primary">Voltar ao início</button>
                </div>
            </section>
        </main>

        <div id="progressSection" style="display:none;">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <span id="progressText" class="progress-text">Processing...</span>
        </div>

        <div id="statusBar" class="status-bar"></div>

        <input type="file" id="presetFileInput" accept=".json" style="display:none">
    </div>

    <script>
        if (typeof require !== "undefined")  window.nodeRequire = require;
        if (typeof cep_node !== "undefined") window.cep_node = cep_node;
    </script>
    <script src="lib/CSInterface.js"></script>
    <script src="js/cutZones.js"></script>
    <script src="js/vadTranslator.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
